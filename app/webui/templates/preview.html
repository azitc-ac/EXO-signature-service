{% extends "base.html" %}
{% block content %}
<h1>Signaturen</h1>

<ul class="nav-sub-tabs">
  <li><a href="/template" class="nav-sub-tab">Vorlagen</a></li>
  <li><a href="/preview" class="nav-sub-tab active">Vorschau</a></li>
</ul>

<div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px">
  <div>
    <label for="email-sel" style="display:block;font-size:13px;color:#555;margin-bottom:4px">Postfach</label>
    <select id="email-sel" style="width:280px" onchange="loadPreview()">
      <option value="">— Postfach wählen —</option>
    </select>
  </div>
  <div>
    <label for="template-sel" style="display:block;font-size:13px;color:#555;margin-bottom:4px">Vorlage</label>
    <select id="template-sel" style="width:200px" onchange="loadPreview()">
      <option value="default">default</option>
    </select>
  </div>
  <button class="btn primary" id="load-btn" onclick="loadPreview()">Vorschau laden</button>
</div>

<div id="error-box" class="alert error" style="display:none"></div>

<div id="preview-area" style="display:none">
  <div style="display:flex;gap:6px;margin-bottom:14px">
    <button class="subtab-btn active" onclick="switchSubtab(this,'pv-html')" style="font-size:12px;padding:4px 12px;border:1px solid #e2e8f0;border-radius:20px;background:#4f46e5;color:#fff;cursor:pointer">HTML-Vorschau</button>
    <button class="subtab-btn" onclick="switchSubtab(this,'pv-txt')"  style="font-size:12px;padding:4px 12px;border:1px solid #e2e8f0;border-radius:20px;background:transparent;color:#555;cursor:pointer">Plaintext</button>
    <button class="subtab-btn" onclick="switchSubtab(this,'pv-src')"  style="font-size:12px;padding:4px 12px;border:1px solid #e2e8f0;border-radius:20px;background:transparent;color:#555;cursor:pointer">HTML-Quelltext</button>
    <span id="banner-badge" style="display:none;align-self:center;font-size:11px;color:#64748b;margin-left:4px"></span>
  </div>
  <div id="pv-html" class="preview-frame" style="min-height:80px"></div>
  <pre id="pv-txt" class="code-block" style="display:none"></pre>
  <pre id="pv-src" class="code-block" style="display:none"></pre>
</div>

<div id="loading-indicator" style="display:none;color:#888;font-size:13px;margin-top:12px">Lädt…</div>

<script>
(function () {
  const emailSel   = document.getElementById('email-sel');
  const templateSel = document.getElementById('template-sel');
  const presetEmail = {{ email | tojson }};

  // Load mailboxes + templates in parallel on page load
  Promise.all([
    fetch('/api/mailboxes').then(r => r.json()),
    fetch('/api/templates').then(r => r.json()),
  ]).then(([mbData, tData]) => {
    // Populate email select
    const mbs = mbData.mailboxes || [];
    mbs.forEach(m => {
      const o = document.createElement('option');
      o.value = m.email;
      o.textContent = m.name !== m.email ? `${m.name} <${m.email}>` : m.email;
      if (m.email === presetEmail) o.selected = true;
      emailSel.appendChild(o);
    });

    // Populate template select
    const tpls = tData.templates || ['default'];
    templateSel.innerHTML = '';
    tpls.forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      templateSel.appendChild(o);
    });

    // Auto-load if a mailbox is pre-selected or only one exists
    if (presetEmail || mbs.length === 1) {
      if (mbs.length === 1) emailSel.value = mbs[0].email;
      if (emailSel.value) loadPreview();
    }
  }).catch(e => showError('Ladefehler: ' + e.message));

  window.loadPreview = async function () {
    const email    = emailSel.value;
    const template = templateSel.value;
    if (!email) return;

    document.getElementById('error-box').style.display  = 'none';
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('loading-indicator').style.display = 'block';
    document.getElementById('load-btn').disabled = true;

    try {
      const r = await fetch(
        `/api/preview-data?email=${encodeURIComponent(email)}&template=${encodeURIComponent(template)}`
      );
      const d = await r.json();

      if (d.error) showError('Graph-Fehler: ' + d.error);

      const bannerHtml = d.banner_html || '';
      document.getElementById('pv-html').innerHTML = (d.html || '') + bannerHtml;
      document.getElementById('pv-txt').textContent  = d.txt || '';
      document.getElementById('pv-src').textContent  = d.html || '';

      const badge = document.getElementById('banner-badge');
      if (d.banner_template) {
        badge.textContent = '+ ' + d.banner_template;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }

      document.getElementById('preview-area').style.display = '';
    } catch(e) {
      showError('Fehler: ' + e.message);
    } finally {
      document.getElementById('loading-indicator').style.display = 'none';
      document.getElementById('load-btn').disabled = false;
    }
  };

  window.switchSubtab = function(clickedBtn, targetId) {
    document.querySelectorAll('.subtab-btn').forEach(b => {
      b.style.background = 'transparent';
      b.style.color      = '#555';
    });
    clickedBtn.style.background = '#4f46e5';
    clickedBtn.style.color      = '#fff';
    ['pv-html','pv-txt','pv-src'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = id === targetId ? '' : 'none';
    });
  };

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }
}());
</script>
{% endblock %}
