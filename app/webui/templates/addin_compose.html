<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EXO Signatur</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      background: #fff;
      padding: 14px;
      color: #1e293b;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #0078d4;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 svg { width: 16px; height: 16px; flex-shrink: 0; }
    .user-info {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-box {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      min-height: 72px;
      background: #f8fafc;
      margin-bottom: 10px;
      font-size: 12px;
      overflow-x: auto;
      line-height: 1.5;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 13px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      border: 1px solid transparent;
      line-height: 1.4;
    }
    .btn-primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .btn-primary:hover:not(:disabled) { background: #106ebe; border-color: #106ebe; }
    .btn-secondary { background: #fff; color: #0078d4; border-color: #d1d5db; }
    .btn-secondary:hover:not(:disabled) { background: #eff6ff; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status { font-size: 11px; min-height: 16px; }
    .ok  { color: #16a34a; }
    .err { color: #dc2626; }
    .loading { color: #64748b; font-style: italic; }
    .hint { font-size: 11px; color: #94a3b8; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>
    <svg viewBox="0 0 20 20" fill="#0078d4" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4zm2 0v1.5l6 4 6-4V4H4zm0 3.5V14h12V7.5l-6 4-6-4z"/>
    </svg>
    EXO Signatur
  </h1>
  <div class="user-info" id="user-info">Benutzer wird ermittelt…</div>
  <!-- Login-Hinweis (erscheint wenn nicht authentifiziert) -->
  <div id="login-required" style="display:none;padding:12px;background:#fef9c3;border:1px solid #fde047;border-radius:6px;margin-bottom:10px">
    <p style="margin-bottom:8px;font-size:12px;color:#713f12">
      Bitte melde dich im Gateway an, damit die Signatur geladen werden kann.
    </p>
    <button class="btn btn-primary" onclick="doLogin()" style="font-size:12px">Jetzt anmelden</button>
    <button class="btn btn-secondary" onclick="loadSig()" style="font-size:12px;margin-left:4px">Erneut versuchen</button>
  </div>

  <div id="tpl-row" style="display:none;margin-bottom:6px;align-items:center;gap:6px">
    <label style="font-size:11px;color:#64748b;white-space:nowrap">Vorlage:</label>
    <select id="tpl-select" onchange="loadAndApply()"
            style="font-size:12px;height:26px;border:1px solid #d1d5db;border-radius:4px;padding:0 6px;flex:1;min-width:0"></select>
  </div>
  <div class="preview-box" id="preview">
    <span class="loading">Signatur wird geladen…</span>
  </div>
  <div class="actions">
    <button class="btn btn-primary"   id="btn-insert"  onclick="replaceSig()" disabled>Einfügen</button>
    <button class="btn btn-secondary" onclick="loadSig()">↺ Neu laden</button>
  </div>
  <div class="status" id="status"></div>
  <p class="hint" id="hint-auto" style="display:none">
    Signatur wurde automatisch eingefügt. Vorlage wechseln oder <strong>Einfügen</strong> klicken zum Aktualisieren.
  </p>
  <div style="margin-top:12px;font-size:10px;color:#cbd5e1;text-align:right">v{{ version }}</div>
  <details style="margin-top:8px;font-size:10px;color:#64748b">
    <summary style="cursor:pointer;color:#94a3b8">Debug</summary>
    <button class="btn btn-secondary" onclick="runDebug()" style="font-size:10px;margin-top:4px;padding:3px 8px">Body analysieren</button>
    <pre id="dbg-out" style="white-space:pre-wrap;word-break:break-all;font-size:9px;margin-top:4px;background:#f8fafc;padding:6px;border:1px solid #e2e8f0;border-radius:4px;max-height:200px;overflow-y:auto"></pre>
  </details>

  <script>
    var _markedSig = '';
    var _MARKER_START = '<!-- exo-sig-start -->';
    var _MARKER_END   = '<!-- exo-sig-end -->';
    var _email = '';
    // Outlook Classic's getAsync strips ALL custom HTML markers (class, id, <a name>,
    // HTML comments) during the setAsync→getAsync round-trip through the Word renderer.
    // Two complementary strategies to detect an existing sig in the Outlook-rendered body:
    //   1. _sigTextProbe / _prevSigTextProbe: first substantial ASCII text node from the
    //      sig HTML.  Walk backward from probe position to outermost unclosed <div>/<table>
    //      for exact region boundaries.  Tries current and previous template's probe to
    //      handle template switches (Minimal→Full: old probe "#gernperDu" isn't in Minimal;
    //      Full→Minimal: new probe "Alexander Zarenko" IS in Full → works directly).
    //   2. _lastSetBody: last body we passed to setAsync (markers still intact).  Used as
    //      fallback when both probes fail (edge case: probe text truly absent from old sig).
    //      Warning: replaces from _lastSetBody as base, so user text typed between two
    //      "Einfügen" clicks may be overwritten.  Rare but documented trade-off.
    var _sigTextProbe  = '';   // probe from current sig
    var _prevSigTextProbe = ''; // probe from previous sig (template switch support)
    var _lastSetBody = null;
    var _addinSession = '';
    try { _addinSession = localStorage.getItem('exo_addin_session') || ''; } catch(_) {}
    function _authHeaders() { return _addinSession ? { 'X-Addin-Session': _addinSession } : {}; }

    Office.onReady(function(info) {
      if (info.host !== Office.HostType.Outlook) return;
      _email = (Office.context.mailbox.userProfile || {}).emailAddress || '';
      document.getElementById('user-info').textContent = _email || '(E-Mail nicht ermittelbar)';
      _loadTemplateList(_email).then(function() { loadSig(); });
    });

    async function _loadTemplateList(email) {
      if (!email) return;
      try {
        var r = await fetch('/api/addin/templates?email=' + encodeURIComponent(email), { headers: _authHeaders() });
        if (!r.ok) return;
        var d = await r.json();
        var list = d.templates || [];
        var def = d.default || 'default';
        var sel = document.getElementById('tpl-select');
        sel.innerHTML = '';
        list.forEach(function(name) {
          var opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          if (name === def) opt.selected = true;
          sel.appendChild(opt);
        });
        document.getElementById('tpl-row').style.display = list.length > 1 ? 'flex' : 'none';
      } catch(_) {}
    }

    function loadSig(emailOverride, onLoaded) {
      var email = emailOverride || _email || (Office.context.mailbox.userProfile || {}).emailAddress || '';
      if (!email) { showStatus('E-Mail-Adresse konnte nicht ermittelt werden.', 'err'); return; }
      var tplSel = document.getElementById('tpl-select');
      var tpl = tplSel && tplSel.value ? '&template=' + encodeURIComponent(tplSel.value) : '';

      document.getElementById('preview').innerHTML = '<span class="loading">Signatur wird geladen…</span>';
      document.getElementById('btn-insert').disabled = true;
      document.getElementById('hint-auto').style.display = 'none';

      fetch('/api/addin/signature?email=' + encodeURIComponent(email) + tpl, { headers: _authHeaders() })
        .then(function(r) {
          if (r.status === 401) { showLoginRequired(); throw null; }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          document.getElementById('login-required').style.display = 'none';
          _prevSigTextProbe = _sigTextProbe;  // keep old probe for template-switch detection
          _markedSig = d.marked_html || '';
          _sigTextProbe = _computeSigProbe(_markedSig);
          if (_markedSig) {
            document.getElementById('preview').innerHTML = d.preview_html || '';
            document.getElementById('btn-insert').disabled = false;
            if (onLoaded) { onLoaded(); } else { _autoInsertIfNew(); }
          } else {
            document.getElementById('preview').innerHTML =
              '<em style="color:#94a3b8">Keine Signatur für diesen Benutzer konfiguriert</em>';
          }
        })
        .catch(function(e) {
          if (!e) return; // handled above (401)
          document.getElementById('preview').innerHTML =
            '<span class="err">Fehler beim Laden: ' + e.message + '</span>';
        });
    }

    function loadAndApply() {
      loadSig(null, function() { if (_markedSig) replaceSig(); });
    }

    function _autoInsertIfNew() {
      if (!_markedSig) return;
      // Replies have inReplyTo set — skip auto-insert.
      if (Office.context.mailbox.item.inReplyTo) return;
      Office.context.mailbox.item.body.getAsync(Office.CoercionType.Html, function(r) {
        if (r.status !== Office.AsyncResultStatus.Succeeded) return;
        var body = r.value || '';
        // Already has our signature (comment / class / sentinel, incl. x_ prefix) → skip.
        if (_findSigRegion(body, body.length)) return;
        // Forwarded messages contain divRplyFwdMsg → skip.
        if (/id=["']?divRplyFwdMsg["']?/i.test(body)) return;
        _doInsert(function(ok) {
          if (ok) {
            document.getElementById('hint-auto').style.display = '';
            showStatus('Automatisch eingefügt ✓', 'ok');
          }
        });
      });
    }

    // Quote/forward boundaries of known clients (mirrors the gateway's
    // _QUOTE_PATTERNS): everything from here down is the quoted original.
    var _QUOTE_RES = [
      /<div\b[^>]*\bid=["'](?:x_)?divrplyfwdmsg["']/i,
      // divtagdefaultwrapper intentionally excluded: OWA uses it as a compose-area
      // wrapper in fresh mails, not just as a quote boundary. Including it would set
      // limit=0 after the first setAsync (OWA wraps the body on return from getAsync),
      // making _findSigRegion unable to locate the previously inserted sig → duplicates.
      // In replies, divrplyfwdmsg fires first and is the reliable boundary.
      /<div\b[^>]*\bid=["'](?:x_)?divfwdmsg["']/i,
      // Outlook Desktop reply separator: border:none + 1pt solid top border.
      /<div\b[^>]*style=["'](?=[^"']*border\s*:\s*none\b)(?=[^"']*border-top\s*:\s*solid\s+#[0-9a-fA-F]{3,6}\s+1[.\d]*pt\b)/i,
      /<div\b[^>]*\bclass=["'][^"']*gmail_quote[^"']*["']/i,
      /<div\b[^>]*\bclass=["'][^"']*yahoo_quoted[^"']*["']/i,
      /<div\b[^>]*\bclass=["'][^"']*moz-cite-prefix[^"']*["']/i,
      /<blockquote\b/i
    ];
    function _findQuoteInsertPos(body) {
      var best = -1;
      _QUOTE_RES.forEach(function(re) { var m = re.exec(body); if (m && (best === -1 || m.index < best)) best = m.index; });
      return best;
    }
    // Index just AFTER the </div> that closes the <div> opened at openIdx.
    function _matchCloseDiv(body, openIdx) {
      var re = /<\/?div\b[^>]*>/ig; re.lastIndex = openIdx; var depth = 0, m;
      while ((m = re.exec(body)) !== null) {
        if (m[0].charAt(1) === '/') { depth--; if (depth === 0) return m.index + m[0].length; }
        else depth++;
      }
      return -1;
    }
    // Locate an EXISTING gateway/add-in signature within body[0..limit].
    // Detection priority:
    // 1. id="exo-sig-s" on the wrapper div: survives Outlook Classic compose
    //    getAsync (class/comments/<a name> all stripped; id is kept as-is in
    //    compose mode, x_-prefixed only in read/quote context).
    // 2. Comment markers: survive in OWA.
    // 3. class="exo-gateway-sig": survives in OWA.
    // x_ prefix handled in all patterns for Exchange-quoted content.
    function _findSigRegion(body, limit) {
      var region = null;
      function consider(s, e) { if (s !== -1 && e !== -1 && s < limit && (region === null || s < region.start)) region = { start: s, end: e }; }
      var iM = body.match(/<div\b[^>]*\bid=["'](?:x_)?exo-sig-s["'][^>]*>/i);
      if (iM) { var ie = _matchCloseDiv(body, iM.index); if (ie !== -1) consider(iM.index, ie); }
      var c = body.indexOf(_MARKER_START);
      if (c !== -1) { var ce = body.indexOf(_MARKER_END, c); if (ce !== -1) consider(c, ce + _MARKER_END.length); }
      var gM = body.match(/<div\b[^>]*\bclass=["'][^"']*exo-gateway-sig[^"']*["'][^>]*>/i);
      if (gM) { var ge = _matchCloseDiv(body, gM.index); if (ge !== -1) consider(gM.index, ge); }
      return region;
    }
    // --- Text-probe sig detection (Outlook Classic) ----------------------------
    // Extract a text node from sig HTML to use as a body probe.
    // Prefers text appearing EXACTLY ONCE: a probe occurring twice in the sig
    // (e.g. the sender's name in both the name row AND the inner contact table)
    // causes lastIndexOf to land on the inner element instead of the outer
    // wrapper, so _regionAroundProbeIdx would detect only that inner element —
    // leaving the surrounding sig structure as an accumulated artifact.
    function _computeSigProbe(html) {
      var re = />([^<\s][^<]{7,})</g, m;
      var ascii = [];
      while ((m = re.exec(html)) !== null) {
        var t = m[1].trim();
        if (t.length >= 8 && /^[\x20-\x7E]+$/.test(t)) ascii.push(t.slice(0, 60));
      }
      // 1st choice: ASCII text that appears exactly once (most reliable anchor)
      for (var i = 0; i < ascii.length; i++) {
        if (html.indexOf(ascii[i]) === html.lastIndexOf(ascii[i])) return ascii[i];
      }
      // 2nd: first ASCII candidate even if it appears more than once
      if (ascii.length) return ascii[0];
      // 3rd: first text node ≥ 8 chars even if non-ASCII
      m = html.match(/>([^<\s][^<]{7,})</);
      return m ? m[1].trim().slice(0, 60) : '';
    }
    // Helper: given a probe position, walk backward through <div>/<table> tags to
    // find the INNERMOST unclosed opening tag (closest to probe), then forward to
    // its matching close.  "Outermost" would grab Word's outer WordSection1 div and
    // replace the entire body — we want only the sig's immediate container.
    function _regionAroundProbeIdx(body, probeIdx) {
      var re = /<\/?(table|div)\b[^>]*>/gi, ms = [], m;
      while ((m = re.exec(body.slice(0, probeIdx))) !== null)
        ms.push({ idx: m.index, tag: m[1].toLowerCase(), open: m[0].charAt(1) !== '/' });
      var dT = 0, dD = 0, oIdx = -1, oTag = null;
      for (var i = ms.length - 1; i >= 0; i--) {
        var ev = ms[i];
        if (!ev.open) { if (ev.tag === 'table') dT++; else dD++; }
        else if (ev.tag === 'table') {
          if (dT === 0) { oIdx = ev.idx; oTag = 'table'; break; }  // stop at innermost
          else dT--;
        } else {
          if (dD === 0) { oIdx = ev.idx; oTag = 'div';   break; }  // stop at innermost
          else dD--;
        }
      }
      if (oIdx === -1) return null;
      // Forward walk: find matching close tag
      re = /<\/?(table|div)\b[^>]*>/gi; re.lastIndex = oIdx;
      var depth = 0, endIdx = -1;
      while ((m = re.exec(body)) !== null) {
        if (m[1].toLowerCase() !== oTag) continue;
        if (m[0].charAt(1) !== '/') depth++;
        else { depth--; if (depth === 0) { endIdx = m.index + m[0].length; break; } }
      }
      if (endIdx === -1) return null;
      // If we found a <table>, check whether a <div> wrapper immediately precedes it
      // (our sig div, stripped of id/class by Outlook).  Include the wrapper so that
      // repeated inserts don't accumulate nested divs.
      if (oTag === 'table') {
        var wM = body.slice(0, oIdx).match(/<div\b[^>]*>\s*$/i);
        if (wM) {
          var wStart = oIdx - wM[0].length;
          var tM = body.slice(endIdx).match(/^\s*<\/div\b[^>]*>/i);
          if (tM) { oIdx = wStart; endIdx += tM[0].length; }
        }
      }
      // Consume trailing blank elements that Outlook's Word renderer appends after
      // block elements on each setAsync→getAsync cycle (empty <p> or bare <br>).
      // Without this each template swap adds one more blank line.
      // The pattern matches: optional whitespace, then either a bare <br> or a <p>
      // whose content is only whitespace / &nbsp; / sub-tags with no visible text.
      var trailRe = /^(\s*(?:<br\b[^>]*\/?>|<p\b[^>]*>(?:\s|&nbsp;|<[^>]+>)*<\/p\s*>))/i;
      var trailSlice = body.slice(endIdx), trailM;
      while ((trailM = trailRe.exec(trailSlice)) !== null) {
        endIdx += trailM[1].length;
        trailSlice = body.slice(endIdx);
      }
      return { start: oIdx, end: endIdx };
    }
    // Locate an existing sig by text-probe search — tries current then previous probe.
    // Prefers searching in the new-content area (before qpos); falls back to full body
    // (covers replies where the sig was appended after the quote on first insert).
    function _findSigByProbe(body, qpos) {
      var probes = [];
      // When the template has changed, try the OLD probe first: it matches the
      // currently-displayed sig's structure, so _regionAroundProbeIdx finds the
      // full old sig region rather than a same-named text node in a different template.
      var templateChanged = _prevSigTextProbe && _prevSigTextProbe !== _sigTextProbe;
      if (templateChanged) {
        probes.push(_prevSigTextProbe);
        if (_sigTextProbe) probes.push(_sigTextProbe);
      } else {
        if (_sigTextProbe) probes.push(_sigTextProbe);
      }
      for (var pi = 0; pi < probes.length; pi++) {
        var probe = probes[pi];
        var idx = (qpos !== -1 ? body.slice(0, qpos) : body).lastIndexOf(probe);
        if (idx === -1 && qpos !== -1) idx = body.lastIndexOf(probe);
        if (idx === -1) continue;
        var r = _regionAroundProbeIdx(body, idx);
        if (r) return r;
      }
      return null;
    }
    // --- End text-probe detection -----------------------------------------------

    // Decide where the signature goes: replace an existing one in the NEW content
    // (never the copy buried in a quoted thread), else insert directly above the
    // quote, else append at the end (plain new mail).
    function _computeInsert(body) {
      var qpos = _findQuoteInsertPos(body);
      var limit = (qpos === -1) ? body.length : qpos;
      var region = _findSigRegion(body, limit);
      if (region) return { body: body.slice(0, region.start) + _markedSig + body.slice(region.end), replaced: true };
      // Fallback: if the sig somehow ended up past the detected quote boundary
      // (e.g. OWA compose wrapper confuses the boundary detection), search the
      // full body so we still replace rather than duplicate.
      if (!region && qpos !== -1) {
        var fullRegion = _findSigRegion(body, body.length);
        if (fullRegion) return { body: body.slice(0, fullRegion.start) + _markedSig + body.slice(fullRegion.end), replaced: true };
      }
      if (qpos !== -1) return { body: body.slice(0, qpos) + _markedSig + body.slice(qpos), replaced: false };
      var bc = body.lastIndexOf('</body>');
      return { body: bc !== -1 ? body.slice(0, bc) + _markedSig + body.slice(bc) : body + _markedSig, replaced: false };
    }

    function replaceSig() {
      if (!_markedSig) return;
      // Always read the current body so user text typed between inserts is preserved.
      Office.context.mailbox.item.body.getAsync(Office.CoercionType.Html, function(r) {
        if (r.status !== Office.AsyncResultStatus.Succeeded) {
          showStatus('Lesevorgang fehlgeschlagen: ' + r.error.message, 'err'); return;
        }
        var body = r.value || '';
        var qpos  = _findQuoteInsertPos(body);
        var limit = (qpos === -1) ? body.length : qpos;
        // 1. HTML-marker detection (OWA / future Outlook with preserved markers)
        var region = _findSigRegion(body, limit);
        if (!region && qpos !== -1) region = _findSigRegion(body, body.length);
        // 2. Text-probe detection (Outlook Classic: markers stripped, text content survives)
        if (!region) region = _findSigByProbe(body, qpos);
        var newBody, replaced;
        if (region) {
          // Found in current body → replace directly (user text preserved)
          newBody = body.slice(0, region.start) + _markedSig + body.slice(region.end);
          replaced = true;
        } else if (_lastSetBody !== null) {
          // Fallback: use last body we set (has markers, but may not reflect user edits
          // made after the previous insert)
          var qpL = _findQuoteInsertPos(_lastSetBody);
          var limL = (qpL === -1) ? _lastSetBody.length : qpL;
          var regL = _findSigRegion(_lastSetBody, limL) || _findSigRegion(_lastSetBody, _lastSetBody.length);
          if (regL) {
            newBody = _lastSetBody.slice(0, regL.start) + _markedSig + _lastSetBody.slice(regL.end);
            replaced = true;
          } else {
            var res = _computeInsert(body); newBody = res.body; replaced = res.replaced;
          }
        } else {
          var res = _computeInsert(body); newBody = res.body; replaced = res.replaced;
        }
        _lastSetBody = newBody;
        Office.context.mailbox.item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function(wr) {
          showStatus(
            wr.status === Office.AsyncResultStatus.Succeeded
              ? (replaced ? 'Signatur ersetzt ✓' : 'Signatur eingefügt ✓')
              : 'Fehler: ' + wr.error.message,
            wr.status === Office.AsyncResultStatus.Succeeded ? 'ok' : 'err'
          );
        });
      });
    }

    function _doInsert(cb) {
      // Use setAsync (full-body) so auto-insert works regardless of cursor position.
      // setSelectedDataAsync fails silently when cursor is in To/Subject field.
      Office.context.mailbox.item.body.setAsync(
        _markedSig,
        { coercionType: Office.CoercionType.Html },
        function(r) {
          var ok = r.status === Office.AsyncResultStatus.Succeeded;
          if (ok) _lastSetBody = _markedSig;  // enables _lastSetBody fallback if probe fails
          cb(ok);
        }
      );
    }

    function showLoginRequired() {
      document.getElementById('preview').innerHTML = '';
      document.getElementById('login-required').style.display = '';
      document.getElementById('btn-insert').disabled = true;
    }

    function doLogin() {
      var url = window.location.origin + '/auth/login/microsoft?next=' + encodeURIComponent('/addin/auth-complete');
      // Azure AD refuses to be framed inside the taskpane (X-Frame-Options), so the
      // login MUST run in an Office dialog (a real popup window). The dialog completes
      // the OIDC flow and hands the signed session token back via messageParent; we
      // store it and send it as X-Addin-Session (the dialog's cookie is not reliably
      // shared with the taskpane webview). Direct taskpane navigation would escape to
      // an external browser and the session would never reach the taskpane.
      if (!(Office.context.ui && Office.context.ui.displayDialogAsync)) {
        window.location.href = url; // last-resort fallback for very old hosts
        return;
      }
      showStatus('Anmeldefenster geöffnet…', 'loading');
      Office.context.ui.displayDialogAsync(url, { height: 60, width: 30, promptBeforeOpen: false }, function(res) {
        if (res.status !== Office.AsyncResultStatus.Succeeded) {
          showStatus('Anmeldefenster konnte nicht geöffnet werden: ' + ((res.error && res.error.message) || ''), 'err');
          return;
        }
        var dlg = res.value;
        dlg.addEventHandler(Office.EventType.DialogMessageReceived, function(arg) {
          var ok = false;
          try {
            var d = JSON.parse(arg.message || '{}');
            if (d.status === 'ok' && d.token) {
              _addinSession = d.token;
              try { localStorage.setItem('exo_addin_session', d.token); } catch(_) {}
              ok = true;
            }
          } catch(_) {}
          try { dlg.close(); } catch(_) {}
          if (ok) {
            document.getElementById('login-required').style.display = 'none';
            showStatus('Angemeldet ✓', 'ok');
            // Re-fetch the template list too — the first attempt ran pre-login (401).
            _loadTemplateList(_email).then(function() { loadSig(); });
          } else {
            showStatus('Anmeldung nicht abgeschlossen. Bitte erneut versuchen.', 'err');
          }
        });
        dlg.addEventHandler(Office.EventType.DialogEventReceived, function() {
          // e.g. 12006 = dialog closed by user — leave the login prompt visible.
        });
      });
    }

    function runDebug() {
      var out = document.getElementById('dbg-out');
      out.textContent = 'Lese Body…';
      Office.context.mailbox.item.body.getAsync(Office.CoercionType.Html, function(r) {
        if (r.status !== Office.AsyncResultStatus.Succeeded) {
          out.textContent = 'Fehler: ' + r.error.message; return;
        }
        var body = r.value || '';
        var lines = [];
        lines.push('Länge: ' + body.length);

        // id (primary, survives Outlook Classic compose)
        var iM = body.match(/<div\b[^>]*\bid=["'](?:x_)?exo-sig-s["'][^>]*>/i);
        lines.push('div id=exo-sig-s: ' + (iM ? 'JA @ ' + iM.index + ' → "' + iM[0].slice(0,80) + '"' : 'NEIN'));
        // <a name> (tested, stripped)
        var aSM = body.match(/<a\b[^>]*\bname=["'](?:x_)?exo-sig-s["'][^>]*>/i);
        lines.push('<a name exo-sig-s>: ' + (aSM ? 'JA @ ' + aSM.index : 'NEIN'));
        // comments
        var c = body.indexOf('<!-- exo-sig-start -->');
        lines.push('<!-- exo-sig-start -->: ' + (c !== -1 ? 'JA @ ' + c : 'NEIN'));
        // class
        var gM = body.match(/<div\b[^>]*\bclass=["'][^"']*exo-gateway-sig[^"']*["'][^>]*>/i);
        lines.push('class=exo-gateway-sig: ' + (gM ? 'JA @ ' + gM.index : 'NEIN'));
        // text content probe
        var txtP = body.indexOf('zarenko.net');
        lines.push('text "zarenko.net": ' + (txtP !== -1 ? 'JA @ ' + txtP : 'NEIN'));
        // snippet of body[0..300]
        lines.push('--- Body[0..300] ---');
        lines.push(body.slice(0, 300));

        lines.push('_sigTextProbe: "' + _sigTextProbe + '"');
        lines.push('_prevSigTextProbe: "' + _prevSigTextProbe + '"');
        lines.push('_lastSetBody: ' + (_lastSetBody !== null ? 'gesetzt (' + _lastSetBody.length + ' Z.)' : 'null'));
        // Test text-probe detection on current body
        var probeRegion = _findSigByProbe(body, _findQuoteInsertPos(body));
        lines.push('_findSigByProbe: ' + (probeRegion ? 'gefunden @ ' + probeRegion.start + '–' + probeRegion.end : 'NICHTS'));

        var qpos = _findQuoteInsertPos(body);
        lines.push('qpos: ' + qpos);

        var limit = qpos === -1 ? body.length : qpos;
        var region = _findSigRegion(body, limit);
        lines.push('_findSigRegion: ' + (region ? 'gefunden @ ' + region.start + '–' + region.end : 'NICHTS'));
        if (!region && qpos !== -1) {
          var fr = _findSigRegion(body, body.length);
          lines.push('_findSigRegion (ganzer Body): ' + (fr ? 'gefunden @ ' + fr.start + '–' + fr.end : 'NICHTS'));
        }

        // snippet around sig-start if found
        if (aSM) {
          lines.push('--- Snippet @ exo-sig-s ---');
          lines.push(body.slice(Math.max(0, aSM.index - 50), aSM.index + 200));
        }

        out.textContent = lines.join('\n');
      });
    }

    function showStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (cls || '');
      if (cls === 'ok') setTimeout(function() { el.textContent = ''; el.className = 'status'; }, 3000);
    }
  </script>
</body>
