{% extends "base.html" %}
{% block content %}

<!-- ── Log-Suche ─────────────────────────────────────────────────────────── -->
<div class="settings-card" style="margin-bottom:20px">
  <h2 style="margin-top:0">Log-Suche</h2>
  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
    <input type="text" id="searchInput" placeholder="Suchbegriff (z.B. E-Mail-Adresse, ERROR, …)"
      style="flex:1; min-width:200px" onkeydown="if(event.key==='Enter') doSearch()">
    <button class="btn primary" onclick="doSearch()">Suchen</button>
    <button class="btn secondary" onclick="clearSearch()">Leeren</button>
  </div>
  <div id="searchStats" style="font-size:12px;color:#666;margin-top:6px;display:none"></div>
  <div id="searchResults" style="margin-top:10px;display:none">
    <pre id="searchPre" class="log-pre" style="max-height:300px;overflow:auto"></pre>
  </div>
</div>

<!-- ── Live-Log ───────────────────────────────────────────────────────────── -->
<div style="display:flex; align-items:baseline; gap:16px; margin-bottom:16px;">
    <h1 style="margin:0">Live-Log</h1>
    <div style="display:flex; gap:8px; margin-left:auto; align-items:center;">
        <label style="font-size:12px; color:#666; display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:400; margin:0;">
            <input type="checkbox" id="chkScroll" checked style="margin:0; width:14px; height:14px;">
            Auto-scroll
        </label>
        <button class="btn secondary btn-sm" onclick="clearLog()">Leeren</button>
        <span id="connStatus" class="log-status connecting">Verbinde…</span>
    </div>
</div>

<div id="logWrap" class="log-wrap">
    <pre id="logPre" class="log-pre"></pre>
</div>

<script>
// ── Suche ──────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = (document.getElementById('searchInput').value || '').trim();
  if (!q) return;
  const stats = document.getElementById('searchStats');
  const results = document.getElementById('searchResults');
  const pre = document.getElementById('searchPre');
  stats.textContent = 'Suche läuft…';
  stats.style.display = 'block';
  results.style.display = 'none';

  const resp = await fetch('/api/logs/search?q=' + encodeURIComponent(q));
  if (!resp.ok) {
    stats.textContent = 'Fehler bei der Suche.';
    return;
  }
  const data = await resp.json();
  const lines = data.results || [];
  stats.textContent = `${lines.length} Treffer${lines.length === 500 ? ' (Limit erreicht)' : ''}`;
  if (lines.length === 0) {
    pre.textContent = '(keine Treffer)';
  } else {
    pre.innerHTML = '';
    lines.forEach(function(line) {
      const span = document.createElement('span');
      span.className = levelClass(line);
      span.textContent = line + '\n';
      pre.appendChild(span);
    });
  }
  results.style.display = 'block';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchStats').style.display = 'none';
  document.getElementById('searchResults').style.display = 'none';
}

// ── Live-Log ───────────────────────────────────────────────────────────────
const pre    = document.getElementById('logPre');
const wrap   = document.getElementById('logWrap');
const status = document.getElementById('connStatus');
const chk    = document.getElementById('chkScroll');
let   es     = null;

function levelClass(line) {
    if (/\bCRITICAL\b/.test(line)) return 'log-critical';
    if (/\bERROR\b/.test(line))    return 'log-error';
    if (/\bWARNING\b/.test(line))  return 'log-warn';
    if (/\bDEBUG\b/.test(line))    return 'log-debug';
    return '';
}

function appendLine(text) {
    const span = document.createElement('span');
    const cls  = levelClass(text);
    if (cls) span.className = cls;
    span.textContent = text + '\n';
    pre.appendChild(span);
    while (pre.children.length > 2000) pre.removeChild(pre.firstChild);
    if (chk.checked) wrap.scrollTop = wrap.scrollHeight;
}

function setStatus(label, cls) {
    status.textContent = label;
    status.className   = 'log-status ' + cls;
}

function connect() {
    if (es) es.close();
    setStatus('Verbinde…', 'connecting');
    es = new EventSource('/log/stream?token={{ stream_token }}');
    es.onopen = () => setStatus('Live', 'live');
    es.onmessage = e => {
        try { appendLine(JSON.parse(e.data)); } catch (_) {}
    };
    es.onerror = () => {
        setStatus('Getrennt – verbinde neu…', 'connecting');
        es.close();
        setTimeout(connect, 3000);
    };
}

function clearLog() { pre.textContent = ''; }

connect();

function _resizeLog() {
    const w = document.getElementById('logWrap');
    if (!w) return;
    const top = w.getBoundingClientRect().top + window.scrollY;
    w.style.height = Math.max(200, window.innerHeight - top - 20) + 'px';
}
window.addEventListener('resize', _resizeLog);
_resizeLog();
</script>
{% endblock %}
