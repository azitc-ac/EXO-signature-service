<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXO Signature Service</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-brand">EXO Signature Service <span class="nav-version">v{{ version }}</span></div>
        <div class="nav-links">
            <ul>
                <li><a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="/template" class="{% if active == 'template' %}active{% endif %}">Templates</a></li>
                <li><a href="/preview" class="{% if active == 'preview' %}active{% endif %}">Vorschau</a></li>
                <li><a href="/smime" class="{% if active == 'smime' %}active{% endif %}">S/MIME</a></li>
                <li><a href="/settings" class="{% if active == 'settings' %}active{% endif %}">Einstellungen</a></li>
                <li><a href="/log" class="{% if active == 'log' %}active{% endif %}">Log</a></li>
                <li><a href="/config-view" class="{% if active == 'config' %}active{% endif %}">System</a></li>
                <li><a href="/setup" class="{% if active == 'setup' %}active{% endif %}">Einrichtung</a></li>
            </ul>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
