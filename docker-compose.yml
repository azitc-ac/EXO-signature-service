services:
  signature-service:
    build: .
    image: exo-signature-service:latest
    container_name: exo-signature-service
    restart: unless-stopped
    ports:
      - "80:80"             # ACME HTTP-01 Challenge für Let's Encrypt
      - "25:25"              # SMTP: EXO Outbound Connector → Proxy
      - "8080:8080"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./templates:/app/templates
      - ./certs:/app/certs
      - ./data:/app/data
      - ./app/webui/static:/app/webui/static:ro
      - ./app/webui/templates:/app/webui/templates:ro
      - ./VERSION:/app/VERSION:ro
    environment:
      # Azure AD / MS Graph
      TENANT_ID: ${TENANT_ID}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      # EXO Re-Inject
      EXO_SMARTHOST: ${EXO_SMARTHOST}
      # SMTP Listener
      SMTP_PORT: 25
      SMTP_TLS_CERT: /app/certs/cert.pem
      SMTP_TLS_KEY: /app/certs/key.pem
      # Web UI
      WEBUI_PORT: 8080
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD}
      # Env seeds (used only on first start before settings.json exists)
      EXO_PORT: ${EXO_PORT:-25}
      FALLBACK_ON_ERROR: ${FALLBACK_ON_ERROR:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBUI_USERNAME: ${WEBUI_USERNAME:-admin}
      USER_WEBSITES: ${USER_WEBSITES:-{}}
      USER_BOOKINGS: ${USER_BOOKINGS:-{}}
      SENT_ITEMS_UPDATE: ${SENT_ITEMS_UPDATE:-false}
